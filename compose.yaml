services:
  postgres:
    image: postgres:17-alpine
    container_name: smartguard-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - smartguard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartguard-network

  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: smartguard-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./docker/mosquitto/passwordfile:/mosquitto/config/passwordfile
    networks:
      - smartguard-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartguard-backend
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_VERSION: ${APP_VERSION}
      SERVER_PORT: ${SERVER_PORT}

      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_ENABLED: ${FLYWAY_ENABLED:-true}
      FLYWAY_BASELINE_ON_MIGRATE: ${FLYWAY_BASELINE_ON_MIGRATE:-true}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}

      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-smartguard-backend}
      MQTT_USERNAME: ${MQTT_USERNAME:-smartguard}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-smartguard_mqtt_dev_password}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-smartguard}

      SENSOR_SILENCE_MONITOR_ENABLED: ${SENSOR_SILENCE_MONITOR_ENABLED:-true}
      SENSOR_SILENCE_MONITOR_FIXED_DELAY_MS: ${SENSOR_SILENCE_MONITOR_FIXED_DELAY_MS:-60000}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      WEBSOCKET_ALLOWED_ORIGINS: ${WEBSOCKET_ALLOWED_ORIGINS}
      WEBSOCKET_APP_PREFIX: ${WEBSOCKET_APP_PREFIX}
      WEBSOCKET_ENDPOINT: ${WEBSOCKET_ENDPOINT}
      WEBSOCKET_TOPIC_PREFIX: ${WEBSOCKET_TOPIC_PREFIX}

      LOG_LEVEL_ROOT: ${LOG_LEVEL_ROOT}
      LOG_LEVEL_APP: ${LOG_LEVEL_APP}

      SPRING_DOCKER_COMPOSE_ENABLED: "false"
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - smartguard-network

volumes:
  smartguard_postgres_data:

networks:
  smartguard-network:
    driver: bridge
